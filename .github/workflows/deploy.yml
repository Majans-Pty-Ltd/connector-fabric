name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_TENANT_ID: op://Majans Dev/Majans Service Principal/tenant_id
          AZURE_CLIENT_ID: op://Majans Dev/Majans Service Principal/client_id
          AZURE_CLIENT_SECRET: op://Majans Dev/Majans Service Principal/client_secret
          FABRIC_API_KEY: op://Majans Dev/Fabric MCP API Key/credential

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push to ACR
        run: |
          az acr build --registry acrmajansagents \
            --image connector-fabric:${{ github.sha }} .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name connector-fabric \
            --resource-group rg-majans-agents \
            --image acrmajansagents.azurecr.io/connector-fabric:${{ github.sha }} \
            --set-env-vars \
              AZURE_TENANT_ID="$AZURE_TENANT_ID" \
              AZURE_CLIENT_ID="$AZURE_CLIENT_ID" \
              AZURE_CLIENT_SECRET="$AZURE_CLIENT_SECRET" \
              FABRIC_API_KEY="$FABRIC_API_KEY"
